<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Playlist Vault</title>
<style>
  :root {
    --green: #1DB954;
    --green-dark: #158a3e;
    --black: #121212;
    --surface: #1e1e1e;
    --surface2: #2a2a2a;
    --surface3: #333;
    --text: #fff;
    --text-muted: #b3b3b3;
    --danger: #e24b4a;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.4);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .logo svg { color: var(--green); }
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 12px 6px 6px;
    font-size: 13px; color: var(--text-muted);
    cursor: pointer;
  }
  .user-pill img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
  .user-pill .avatar-placeholder {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }

  main { flex: 1; padding: 32px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* Auth Screen */
  #auth-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 70vh; text-align: center; gap: 24px;
  }
  .hero-icon {
    width: 80px; height: 80px;
    background: rgba(29,185,84,0.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
  }
  #auth-screen h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  #auth-screen p { color: var(--text-muted); max-width: 420px; font-size: 16px; }
  .feature-pills { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .pill {
    background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .pill span { color: var(--green); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s; text-decoration: none;
    white-space: nowrap;
  }
  .btn-green { background: var(--green); color: #000; }
  .btn-green:hover { background: #1ed760; transform: scale(1.02); }
  .btn-surface {
    background: var(--surface2); color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn-surface:hover { background: var(--surface3); }
  .btn-danger { background: rgba(226,75,74,0.15); color: var(--danger); border: 1px solid rgba(226,75,74,0.3); }
  .btn-danger:hover { background: rgba(226,75,74,0.25); }
  .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 20px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* Sections */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title { font-size: 20px; font-weight: 700; }
  .section-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--surface); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .tab {
    padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-muted); transition: all 0.15s; border: none; background: none;
  }
  .tab.active { background: var(--surface2); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  /* Playlist Grid */
  .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .playlist-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-lg);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .playlist-card:hover { background: var(--surface2); border-color: rgba(255,255,255,0.12); }
  .playlist-card.selected {
    border-color: var(--green);
    background: rgba(29,185,84,0.06);
  }
  .playlist-cover {
    width: 100%; aspect-ratio: 1; border-radius: var(--radius);
    object-fit: cover; margin-bottom: 10px;
    background: var(--surface2);
  }
  .playlist-cover-placeholder {
    width: 100%; aspect-ratio: 1; border-radius: var(--radius);
    background: var(--surface3); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; color: var(--text-muted);
  }
  .playlist-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .playlist-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .check-badge {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--green); color: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }

  /* Selection bar */
  .selection-bar {
    position: sticky; bottom: 20px; z-index: 5;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-lg);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px;
    backdrop-filter: blur(10px);
  }
  .selection-bar.hidden { display: none; }

  /* Backup List */
  .backup-list { display: flex; flex-direction: column; gap: 12px; }
  .backup-item {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .backup-icon {
    width: 44px; height: 44px; border-radius: var(--radius);
    background: rgba(29,185,84,0.12);
    display: flex; align-items: center; justify-content: center;
    color: var(--green); font-size: 20px; flex-shrink: 0;
  }
  .backup-info { flex: 1; min-width: 0; }
  .backup-name { font-weight: 600; font-size: 15px; }
  .backup-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .backup-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* Restore Screen */
  .restore-zone {
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: var(--radius-lg);
    padding: 48px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 24px;
  }
  .restore-zone:hover, .restore-zone.dragover {
    border-color: var(--green);
    background: rgba(29,185,84,0.04);
  }

  /* Progress / Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius); padding: 12px 20px;
    font-size: 14px; display: flex; align-items: center; gap: 10px;
    z-index: 100; min-width: 260px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: rgba(29,185,84,0.4); }
  .toast.error { border-color: rgba(226,75,74,0.4); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .dot.err { background: var(--danger); }

  /* Loading spinner */
  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--green);
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress bar */
  .progress-wrap { margin-top: 16px; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* Settings */
  .setup-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-lg);
    padding: 24px; margin-bottom: 20px;
  }
  .setup-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .setup-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
  input[type="text"], input[type="password"] {
    width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-size: 14px;
    margin-bottom: 10px; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: rgba(29,185,84,0.5); }
  label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 4px; }

  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .tag-green { background: rgba(29,185,84,0.15); color: var(--green); }
  .tag-muted { background: var(--surface2); color: var(--text-muted); }

  .empty { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }
  .empty svg { margin-bottom: 12px; opacity: 0.3; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 50;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-lg); padding: 28px; max-width: 480px; width: 90%;
  }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 24px 0; }

  .restore-preview {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-lg); overflow: hidden;
    margin-bottom: 20px;
  }
  .restore-preview-header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
  }
  .restore-preview-body { max-height: 320px; overflow-y: auto; }
  .restore-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .restore-row:last-child { border-bottom: none; }
  .restore-row-info { flex: 1; min-width: 0; }
  .restore-row-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .restore-row-meta { font-size: 11px; color: var(--text-muted); }

  @media (max-width: 600px) {
    main { padding: 16px; }
    header { padding: 14px 16px; }
    .playlist-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .selection-bar { flex-direction: column; gap: 10px; text-align: center; }
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 11-.277-1.215c3.809-.87 7.076-.496 9.713 1.115a.622.622 0 01.206.857zm1.223-2.722a.779.779 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.779.779 0 01-.967-.519.779.779 0 01.52-.966c3.632-1.102 8.147-.569 11.227 1.322a.779.779 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.935.935 0 11-.543-1.79c3.532-1.072 9.404-.866 13.115 1.338a.935.935 0 01-.955 1.609z"/></svg>
    Playlist Vault
  </div>
  <div id="user-area"></div>
</header>

<main id="main-content"></main>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="dot" id="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const REDIRECT_URI = 'https://navidk21.github.io/spotify-hub/spotify-backup.html';
const SCOPES = 'playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private';
const STORAGE_KEY = 'spotify_vault_backups';
const CREDS_KEY = 'spotify_vault_creds';

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  view: 'auth',         // auth | setup | app
  tab: 'backup',        // backup | restore | settings
  accessToken: null,
  user: null,
  playlists: [],
  selectedIds: new Set(),
  backups: [],
  loading: false,
  restoreData: null,    // parsed backup file
  clientId: '',
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showToast(msg, type = 'success') {
  const t = $('toast');
  $('toast-msg').textContent = msg;
  $('toast-dot').className = 'dot' + (type === 'error' ? ' err' : '');
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 3500);
}

function showModal(title, body, actions) {
  $('modal-title').textContent = title;
  $('modal-body').textContent = body;
  const a = $('modal-actions');
  a.innerHTML = '';
  actions.forEach(({ label, cls, cb }) => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + cls;
    btn.textContent = label;
    btn.onclick = () => { $('modal').classList.add('hidden'); cb(); };
    a.appendChild(btn);
  });
  $('modal').classList.remove('hidden');
}

$('modal').addEventListener('click', e => {
  if (e.target === $('modal')) $('modal').classList.add('hidden');
});

function loadBackups() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveBackups(b) { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); }
function loadCreds() {
  try { return JSON.parse(localStorage.getItem(CREDS_KEY) || '{}'); } catch { return {}; }
}
function saveCreds(c) { localStorage.setItem(CREDS_KEY, JSON.stringify(c)); }

function fmtDate(ts) {
  return new Date(ts).toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ─── PKCE Auth ────────────────────────────────────────────────────────────────
function rand(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
}

async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function startAuth() {
  const creds = loadCreds();
  if (!creds.clientId) { setState({ view: 'setup' }); render(); return; }
  state.clientId = creds.clientId;
  const verifier = rand(64);
  const challenge = await sha256(verifier);
  localStorage.setItem('spotify_pkce_verifier', verifier);
  localStorage.setItem('spotify_auth_state', rand(16));
  const url = new URL('https://accounts.spotify.com/authorize');
  url.searchParams.set('client_id', creds.clientId);
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('redirect_uri', REDIRECT_URI);
  url.searchParams.set('scope', SCOPES);
  url.searchParams.set('code_challenge_method', 'S256');
  url.searchParams.set('code_challenge', challenge);
  url.searchParams.set('state', localStorage.getItem('spotify_auth_state'));
  window.location = url.toString();
}

async function handleCallback(code) {
  const verifier = localStorage.getItem('spotify_pkce_verifier');
  const creds = loadCreds();
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code, redirect_uri: REDIRECT_URI,
      client_id: creds.clientId, code_verifier: verifier,
    }),
  });
  if (!res.ok) throw new Error('Token exchange failed');
  const data = await res.json();
  localStorage.setItem('spotify_vault_token', data.access_token);
  localStorage.setItem('spotify_vault_expiry', Date.now() + data.expires_in * 1000);
  // clean URL
  history.replaceState({}, '', window.location.pathname);
}

function getToken() { return localStorage.getItem('spotify_vault_token'); }

function tokenValid() {
  const exp = parseInt(localStorage.getItem('spotify_vault_expiry') || '0');
  return Date.now() < exp - 30000;
}

// ─── Spotify API ──────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const token = getToken();
  if (!token) throw new Error('Not authenticated');
  const res = await fetch('https://api.spotify.com/v1' + path, {
    ...opts,
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  if (res.status === 401) { localStorage.removeItem('spotify_vault_token'); localStorage.removeItem('spotify_vault_expiry'); setState({ view: 'auth' }); render(); throw new Error('Session expired'); }
  if (!res.ok) {
    let msg = `API error ${res.status}`;
    try { const d = await res.json(); msg = d.error?.message || msg; } catch {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function getAllPages(path) {
  let url = path, items = [];
  while (url) {
    const isAbsolute = url.startsWith('http');
    const data = isAbsolute
      ? await (await fetch(url, { headers: { Authorization: 'Bearer ' + getToken() } })).json()
      : await api(url);
    items = items.concat(data.items || []);
    url = data.next ? (isAbsolute ? data.next : null) : null;
    if (data.next && isAbsolute) url = data.next;
    else if (data.next) url = data.next;
  }
  return items;
}

async function fetchUser() {
  return api('/me');
}

async function fetchPlaylists() {
  const data = await api('/me/playlists?limit=50');
  let items = data.items;
  let next = data.next;
  while (next) {
    const d = await (await fetch(next, { headers: { Authorization: 'Bearer ' + getToken() } })).json();
    items = items.concat(d.items);
    next = d.next;
  }
  return items.filter(Boolean);
}

async function fetchPlaylistTracks(playlistId) {
  let url = `https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=100`;
  let tracks = [];
  while (url) {
    const d = await (await fetch(url, { headers: { Authorization: 'Bearer ' + getToken() } })).json();
    tracks = tracks.concat((d.items || []).filter(i => i && i.track && i.track.id));
    url = d.next;
  }
  return tracks;
}

async function createPlaylist(userId, name, description, isPublic) {
  return api(`/users/${userId}/playlists`, {
    method: 'POST',
    body: JSON.stringify({ name, description: description || '', public: isPublic }),
  });
}

async function addTracksToPlaylist(playlistId, trackUris) {
  // Spotify allows max 100 tracks per request
  for (let i = 0; i < trackUris.length; i += 100) {
    await api(`/playlists/${playlistId}/tracks`, {
      method: 'POST',
      body: JSON.stringify({ uris: trackUris.slice(i, i + 100) }),
    });
  }
}

// ─── State ────────────────────────────────────────────────────────────────────
function setState(patch) { Object.assign(state, patch); }

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  state.backups = loadBackups();

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    try {
      await handleCallback(code);
    } catch (e) {
      showToast('Auth failed: ' + e.message, 'error');
      setState({ view: 'auth' });
      render();
      return;
    }
  }

  if (tokenValid()) {
    try {
      state.user = await fetchUser();
    } catch (e) {
      showToast('Could not load user: ' + e.message, 'error');
      setState({ view: 'auth' });
      render();
      return;
    }
    try {
      state.playlists = await fetchPlaylists();
    } catch (e) {
      showToast('Could not load playlists: ' + e.message, 'error');
      state.playlists = [];
    }
    setState({ view: 'app', tab: 'backup' });
  } else {
    const creds = loadCreds();
    setState({ view: creds.clientId ? 'auth' : 'setup' });
  }
  render();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const main = $('main-content');
  const userArea = $('user-area');

  if (state.view === 'auth') {
    userArea.innerHTML = '';
    main.innerHTML = renderAuth();
  } else if (state.view === 'setup') {
    userArea.innerHTML = '';
    main.innerHTML = renderSetup();
    attachSetupHandlers();
  } else {
    userArea.innerHTML = renderUserPill();
    if (state.tab === 'backup') main.innerHTML = renderBackup();
    else if (state.tab === 'restore') main.innerHTML = renderRestore();
    else if (state.tab === 'settings') main.innerHTML = renderSettings();
    attachAppHandlers();
  }
}

    <p style="font-size:13px;color:var(--text-muted)">First time? <a href="#" onclick="setState({view:'setup'});render();return false;" style="color:var(--green)">Set up your Client ID</a></p>

}

    <p>Playlist Vault uses Spotify's API with PKCE — no server or client secret needed. You just need a free Spotify Developer app.</p>
    <div style="background:var(--surface2);border-radius:var(--radius);padding:16px;margin-bottom:16px;font-size:13px;color:var(--text-muted);line-height:1.8">
      <strong style="color:var(--text)">One-time setup:</strong><br>

function attachSetupHandlers() {
  window.saveClientId = () => {
    const id = $('client-id-input').value.trim();
    if (!id || id.length < 10) { showToast('Enter a valid Client ID', 'error'); return; }
    saveCreds({ clientId: id });
    state.clientId = id;
    startAuth();
  };
}

function renderUserPill() {
  const u = state.user;
  const img = u?.images?.[0]?.url;
  const initials = (u?.display_name || '?').slice(0, 2).toUpperCase();
  return `<div class="user-pill" onclick="setState({view:'app',tab:'settings'});render()">
    ${img ? `<img src="${img}" alt="">` : `<div class="avatar-placeholder">${initials}</div>`}

  </div>`;
}

function renderBackup() {
  const sel = state.selectedIds;
  const pls = state.playlists;
  return `
  <div class="tabs">
    <button class="tab active" onclick="switchTab('backup')">Back up</button>
    <button class="tab" onclick="switchTab('restore')">Restore</button>
    <button class="tab" onclick="switchTab('settings')">Settings</button>
  </div>

  <div class="section-header">
    <div>
      <div class="section-title">Your Playlists</div>
      <div class="section-sub">${pls.length} playlists — select which to back up</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-surface btn-sm" onclick="toggleSelectAll()">
        ${sel.size === pls.length ? 'Deselect all' : 'Select all'}
      </button>
      <button class="btn btn-surface btn-sm" onclick="refreshPlaylists()">↻ Refresh</button>
    </div>
  </div>

  <div class="playlist-grid">
    ${pls.length === 0 ? '<div class="empty" style="grid-column:1/-1">No playlists found</div>' :
      pls.map(pl => {
        const img = pl.images?.[0]?.url;
        const isSelected = sel.has(pl.id);
        return `<div class="playlist-card ${isSelected ? 'selected' : ''}" onclick="toggleSelect('${pl.id}')">
          ${isSelected ? '<div class="check-badge">✓</div>' : ''}
          ${img
            ? `<img class="playlist-cover" src="${img}" alt="" loading="lazy">`
            : `<div class="playlist-cover-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`
          }
          <div class="playlist-name" title="${pl.name}">${pl.name}</div>
          <div class="playlist-meta">${pl.tracks.total} tracks</div>
        </div>`;
      }).join('')
    }
  </div>

  <div class="selection-bar ${sel.size === 0 ? 'hidden' : ''}">
    <div>
      <strong>${sel.size}</strong> playlist${sel.size !== 1 ? 's' : ''} selected
      <span style="color:var(--text-muted);font-size:13px;margin-left:8px">
        (~${pls.filter(p => sel.has(p.id)).reduce((a,p) => a+p.tracks.total,0)} tracks)
      </span>
    </div>
    <button class="btn btn-green" id="backup-btn" onclick="runBackup()">
      Download backup (.json)
    </button>
  </div>

  <div class="divider"></div>

  <div class="section-header">
    <div>
      <div class="section-title">Saved Backups</div>
      <div class="section-sub">Stored in your browser — export to keep them safe</div>
    </div>
  </div>

  ${renderBackupList()}
  `;
}

function renderBackupList() {
  const backups = loadBackups();
  if (backups.length === 0) {
    return `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 12px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>No backups yet — select playlists above and download</div>`;
  }
  return `<div class="backup-list">
    ${backups.map((b, i) => `
    <div class="backup-item">
      <div class="backup-icon">🎵</div>
      <div class="backup-info">
        <div class="backup-name">${b.label}</div>
        <div class="backup-meta">${b.playlistCount} playlist${b.playlistCount!==1?'s':''} · ${b.trackCount} tracks · ${fmtDate(b.timestamp)}</div>
      </div>
      <div class="backup-actions">
        <button class="btn btn-surface btn-sm" onclick="exportBackup(${i})">Export</button>
        <button class="btn btn-danger btn-sm" onclick="deleteBackup(${i})">Delete</button>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderRestore() {
  return `
  <div class="tabs">
    <button class="tab" onclick="switchTab('backup')">Back up</button>
    <button class="tab active" onclick="switchTab('restore')">Restore</button>
    <button class="tab" onclick="switchTab('settings')">Settings</button>
  </div>

  <div class="section-header">
    <div class="section-title">Restore Playlists</div>
  </div>

  <div class="restore-zone" id="drop-zone" onclick="$('file-input').click()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;display:block;color:var(--text-muted)"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div style="font-weight:600;margin-bottom:4px">Drop a backup file here</div>
    <div style="font-size:13px;color:var(--text-muted)">or click to browse — accepts .json files exported from Playlist Vault</div>
  </div>
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileSelect(event)">

  ${state.restoreData ? renderRestorePreview() : ''}
  `;
}

function renderRestorePreview() {
  const d = state.restoreData;
  return `
  <div class="section-header" style="margin-top:24px">
    <div>
      <div class="section-title">Backup Preview</div>
      <div class="section-sub">Backed up ${fmtDate(d.timestamp)} · ${d.playlists.length} playlists · ${d.playlists.reduce((a,p)=>a+p.tracks.length,0)} tracks</div>
    </div>
  </div>
  <div class="restore-preview">
    ${d.playlists.map(pl => `

      <div class="restore-preview-header">
        <div>
          <strong>${pl.name}</strong>

          ${pl.public ? '<span class="tag tag-green" style="margin-left:4px">public</span>' : ''}
        </div>

  <button class="btn btn-green" onclick="restoreAll()" style="width:100%;justify-content:center">

function renderSettings() {
  const creds = loadCreds();
  const u = state.user;
  return `
  <div class="tabs">
    <button class="tab" onclick="switchTab('backup')">Back up</button>
    <button class="tab" onclick="switchTab('restore')">Restore</button>
    <button class="tab active" onclick="switchTab('settings')">Settings</button>
  </div>

  <div class="setup-card">
    <h3>Account</h3>
    <p>Logged in as <strong style="color:var(--text)">${u?.display_name}</strong> (${u?.email || u?.id})</p>
    <button class="btn btn-danger btn-sm" onclick="logout()">Sign out</button>
  </div>

  <div class="setup-card">
    <h3>Spotify App</h3>
    <p>Client ID: <code style="color:var(--green)">${(creds.clientId||'').slice(0,8)}…</code></p>
    <button class="btn btn-surface btn-sm" onclick="setState({view:'setup'});render()">Change Client ID</button>
  </div>

  <div class="setup-card">
    <h3>Local Backups</h3>
    <p>${loadBackups().length} backup${loadBackups().length!==1?'s':''} stored in this browser.</p>
    <button class="btn btn-danger btn-sm" onclick="clearAllBackups()">Clear all backups</button>
  </div>`;
}

// ─── Handlers ─────────────────────────────────────────────────────────────────
function attachAppHandlers() {
  window.switchTab = (tab) => { setState({ tab }); render(); };
  window.toggleSelect = (id) => {
    state.selectedIds.has(id) ? state.selectedIds.delete(id) : state.selectedIds.add(id);
    render();
  };
  window.toggleSelectAll = () => {
    if (state.selectedIds.size === state.playlists.length) {
      state.selectedIds.clear();
    } else {
      state.playlists.forEach(p => state.selectedIds.add(p.id));
    }
    render();
  };
  window.refreshPlaylists = async () => {
    try {
      state.playlists = await fetchPlaylists();
      render();
      showToast('Playlists refreshed');
    } catch (e) { showToast(e.message, 'error'); }
  };

  window.runBackup = async () => {
    const btn = $('backup-btn');
    if (!btn || state.loading) return;
    setState({ loading: true });
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Fetching tracks…';

    try {
      const selectedPlaylists = state.playlists.filter(p => state.selectedIds.has(p.id));
      const result = [];
      for (let i = 0; i < selectedPlaylists.length; i++) {
        const pl = selectedPlaylists[i];
        btn.innerHTML = `<div class="spinner"></div> ${i+1}/${selectedPlaylists.length}: ${pl.name}`;
        const tracks = await fetchPlaylistTracks(pl.id);
        result.push({
          id: pl.id, name: pl.name, description: pl.description,
          public: pl.public, collaborative: pl.collaborative,
          tracks: tracks.map(t => ({
            id: t.track.id, uri: t.track.uri,
            name: t.track.name,
            artists: t.track.artists.map(a => a.name).join(', '),
            album: t.track.album?.name || '',
            addedAt: t.added_at,
          })),
        });
      }

      const backup = {
        version: 1,
        timestamp: Date.now(),
        user: state.user.id,
        playlistCount: result.length,
        trackCount: result.reduce((a,p) => a+p.tracks.length, 0),
        label: result.length === 1 ? result[0].name : `${result.length} playlists`,
        playlists: result,
      };

      // Download
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `playlist-vault-${new Date().toISOString().slice(0,10)}.json`;
      a.click();

      // Also store in localStorage (trimmed for space)
      const stored = loadBackups();
      stored.unshift({ ...backup, playlists: undefined }); // store metadata only
      saveBackups(stored.slice(0, 20));

      showToast(`Backup complete — ${backup.trackCount} tracks saved`);
      state.selectedIds.clear();
    } catch (e) {
      showToast('Backup failed: ' + e.message, 'error');
    }
    setState({ loading: false });
    render();
  };

  window.exportBackup = (i) => {
    const b = loadBackups()[i];
    const blob = new Blob([JSON.stringify(b, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `playlist-vault-export-${i+1}.json`;
    a.click();
  };

  window.deleteBackup = (i) => {
    showModal('Delete backup', 'This removes the metadata entry from this browser. The downloaded JSON file is not affected.', [
      { label: 'Cancel', cls: 'btn-surface', cb: () => {} },
      { label: 'Delete', cls: 'btn-danger', cb: () => {
        const b = loadBackups(); b.splice(i, 1); saveBackups(b);
        showToast('Backup entry deleted'); render();
      }},
    ]);
  };

  window.handleDragOver = (e) => { e.preventDefault(); $('drop-zone').classList.add('dragover'); };
  window.handleDragLeave = () => { $('drop-zone').classList.remove('dragover'); };
  window.handleDrop = (e) => {
    e.preventDefault();
    $('drop-zone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) parseBackupFile(file);
  };
  window.handleFileSelect = (e) => {
    const file = e.target.files[0];
    if (file) parseBackupFile(file);
  };

  window.restoreSinglePlaylist = async (plId) => {
    const pl = state.restoreData.playlists.find(p => p.id === plId);
    if (!pl) return;
    await doRestore([pl]);
  };

  window.restoreAll = async () => {
    if (!state.restoreData) return;
    showModal(
      `Restore ${state.restoreData.playlists.length} playlists`,
      `This will create new playlists in your Spotify account. Your existing playlists are untouched.`,
      [
        { label: 'Cancel', cls: 'btn-surface', cb: () => {} },
        { label: 'Restore', cls: 'btn-green', cb: () => doRestore(state.restoreData.playlists) },
      ]
    );
  };

  window.logout = () => {
    localStorage.removeItem('spotify_vault_token'); localStorage.removeItem('spotify_vault_expiry');
    setState({ view: 'auth', user: null, playlists: [], selectedIds: new Set() });
    render();
  };

  window.clearAllBackups = () => {
    showModal('Clear all backups', 'Remove all backup metadata from this browser? This does not delete your downloaded JSON files.', [
      { label: 'Cancel', cls: 'btn-surface', cb: () => {} },
      { label: 'Clear all', cls: 'btn-danger', cb: () => {
        saveBackups([]); showToast('Backups cleared'); render();
      }},
    ]);
  };
}

async function parseBackupFile(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.playlists || !Array.isArray(data.playlists)) throw new Error('Invalid backup format');
    setState({ restoreData: data });
    render();
    showToast(`Loaded backup — ${data.playlists.length} playlists`);
  } catch (e) {
    showToast('Could not read backup file: ' + e.message, 'error');
  }
}

async function doRestore(playlists) {
  if (state.loading) return;
  setState({ loading: true });

  let created = 0, failed = 0;
  for (const pl of playlists) {
    try {
      const newPl = await createPlaylist(state.user.id, pl.name + ' (restored)', pl.description || '', pl.public || false);
      const uris = pl.tracks.map(t => t.uri).filter(Boolean);
      if (uris.length > 0) await addTracksToPlaylist(newPl.id, uris);
      created++;
    } catch (e) {
      console.error('Failed to restore', pl.name, e);
      failed++;
    }
  }
  setState({ loading: false });
  if (failed === 0) {
    showToast(`Restored ${created} playlist${created!==1?'s':''} to Spotify ✓`);
  } else {
    showToast(`${created} restored, ${failed} failed`, failed > 0 ? 'error' : 'success');
  }
  // refresh playlists
  try { state.playlists = await fetchPlaylists(); } catch {}
  render();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
